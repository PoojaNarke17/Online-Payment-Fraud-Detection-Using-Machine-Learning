<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralGuard | Analysis Report</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f52ba;
            --primary-hover: #0b3d8a;
            --success: #10b981;
            --success-light: #d1fae5;
            --danger: #ef4444;
            --danger-light: #fee2e2;
            --surface: #ffffff;
            --background: #f8fafc;
            --text-dark: #0f172a;
            --text-medium: #475569;
            --text-light: #94a3b8;
            --border: #e2e8f0;
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            
            /* Status defaults (overridden by JS) */
            --status-color: var(--success);
            --status-bg: var(--success-light);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--background);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Top Navigation */
        nav {
            width: 100%;
            background: white;
            border-bottom: 1px solid var(--border);
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 700;
            font-size: 1.25rem;
        }

        .brand-icon {
            width: 32px;
            height: 32px;
            background: var(--primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: 800;
        }

        /* Report Container */
        .container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            width: 100%;
        }

        .report-card {
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            overflow: hidden;
            animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .report-header {
            background: var(--status-bg);
            padding: 2.5rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .status-icon {
            width: 64px;
            height: 64px;
            background: white;
            color: var(--status-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            margin: 0 auto 1.5rem;
            box-shadow: var(--shadow-md);
        }

        .status-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--status-color);
            margin-bottom: 0.5rem;
        }

        .status-desc {
            color: var(--text-medium);
            font-size: 0.95rem;
            max-width: 300px;
            margin: 0 auto;
        }

        .report-body {
            padding: 2rem;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 1rem 0;
            border-bottom: 1px solid var(--border);
        }
        
        .detail-row:last-child {
            border-bottom: none;
        }

        .detail-label {
            color: var(--text-medium);
            font-weight: 500;
            font-size: 0.9rem;
        }

        .detail-value {
            color: var(--text-dark);
            font-weight: 600;
            font-size: 0.95rem;
        }

        .confidence-bar {
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin-top: 0.5rem;
            overflow: hidden;
        }

        .confidence-fill {
            height: 100%;
            width: 99.8%;
            background: var(--status-color);
        }

        .report-actions {
            padding: 1.5rem 2rem 2rem;
            display: flex;
            gap: 1rem;
        }

        .btn {
            flex: 1;
            padding: 0.875rem;
            border-radius: 8px;
            font-weight: 600;
            font-size: 0.95rem;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: var(--primary);
            color: white;
            box-shadow: var(--shadow-md);
        }

        .btn-primary:hover {
            background: var(--primary-hover);
        }

        .btn-secondary {
            background: white;
            color: var(--text-dark);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--background);
        }

    </style>
</head>
<body>

    <!-- Inject data from Flask -->
    <div id="data-result" style="display:none;">{{ result }}</div>
    <div id="data-class" style="display:none;">{{ result_class }}</div>

    <nav>
        <a href="/" class="brand">
            <div class="brand-icon">N</div>
            NeuralGuard
        </a>
    </nav>

    <div class="container">
        <div class="report-card">
            <div class="report-header">
                <div class="status-icon" id="statusIcon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
                </div>
                <h1 class="status-title" id="statusTitle">Transaction Approved</h1>
                <p class="status-desc" id="statusDesc">No fraudulent patterns detected. The transaction is secure.</p>
            </div>
            
            <div class="report-body">
                <div class="detail-row">
                    <span class="detail-label">Risk Assessment</span>
                    <span class="detail-value" id="riskLevel" style="color:var(--status-color)">Low Risk</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Analysis Model</span>
                    <span class="detail-value">XGBoost Ensemble v4</span>
                </div>
                <div class="detail-row">
                    <span class="detail-label">Processing Time</span>
                    <span class="detail-value">42ms</span>
                </div>
                
                <div style="margin-top: 1.5rem;">
                    <div style="display:flex; justify-content:space-between; margin-bottom:0.25rem;">
                        <span class="detail-label">Model Confidence</span>
                        <span class="detail-value">99.8%</span>
                    </div>
                    <div class="confidence-bar">
                        <div class="confidence-fill"></div>
                    </div>
                </div>
            </div>

            <div class="report-actions">
                <a href="/predict" class="btn btn-secondary">New Scan</a>
                <a href="/" class="btn btn-primary">Dashboard</a>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const rawResult = document.getElementById('data-result').innerText;
            const resClass = document.getElementById('data-class').innerText; // "fraud" or "safe"

            const isFraud = resClass === 'fraud';

            if (isFraud) {
                document.documentElement.style.setProperty('--status-color', 'var(--danger)');
                document.documentElement.style.setProperty('--status-bg', 'var(--danger-light)');
                
                document.getElementById('statusIcon').innerHTML = '<svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path></svg>';
                document.getElementById('statusTitle').innerText = 'Transaction Declined';
                document.getElementById('statusDesc').innerText = rawResult.replace('⚠️', '').replace('✅', '').trim() || 'Fraudulent patterns detected. Transaction blocked.';
                document.getElementById('riskLevel').innerText = 'Critical Risk';
            } else {
                document.getElementById('statusTitle').innerText = 'Transaction Approved';
                document.getElementById('statusDesc').innerText = rawResult.replace('⚠️', '').replace('✅', '').trim() || 'No fraudulent patterns detected. The transaction is secure.';
                document.getElementById('riskLevel').innerText = 'Low Risk';
            }
        });
    </script>
</body>
</html>
